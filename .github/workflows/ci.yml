name: archive integrity

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-deprecation:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Compile sensitivity scanner
        run: python3 -m py_compile ci/scan_public_repo.py

      - name: Shell syntax
        run: |
          bash -n bootstrap-container.sh
          bash -n install-scripts/gentoo-up.sh
          bash -n install-scripts/gentoo-down.sh
          bash -n install-scripts/gentoo-shell.sh

      - name: Commands fail closed
        run: |
          set -euo pipefail
          for script in bootstrap-container.sh install-scripts/gentoo-up.sh install-scripts/gentoo-down.sh install-scripts/gentoo-shell.sh; do
            set +e
            bash "$script" >/tmp/out 2>/tmp/err
            rc=$?
            set -e
            test "$rc" -eq 64
            test -s /tmp/err
          done

      - name: Archive and ontology invariants
        run: |
          set -euo pipefail
          ! grep -RInE 'skipping.*exit 0|systemd-nspawn.*skipping' bootstrap-container.sh install-scripts
          grep -Fq 'archive candidate' README.md
          grep -Fq 'authority: none' MODOS_COMPONENT.yaml
          grep -Fq 'lifecycle: retired' MODOS_COMPONENT.yaml
          grep -Fq 'promotionPolicy: never-promote' MODOS_COMPONENT.yaml
          test -f LICENSE
          test -f SECURITY.md
          test -f ARCHIVE_NOTICE.md
          test -f RELEASE_READINESS_CHECKPOINT.md
          test ! -e .github/workflows/release.yml

      - name: Scan public tree and reachable Git history
        run: python3 ci/scan_public_repo.py
