apiVersion: modos.pleiades/v1alpha1
kind: Component
metadata:
  name: pleiades-termux-container-adapter
  repository: Zheke32174/pleiades-container-termux
  visibility: public
  lifecycle: retired
  defaultBranch: main
spec:
  roles:
    - deprecation-redirect
    - historical-lineage-reference
  authority: none
  inputs:
    - legacy-container-command-invocations
  outputs:
    - fail-closed-deprecation-notice
    - supported-successor-links
  capabilitiesProvided: []
  capabilitiesRequired: []
  dataClasses:
    - public
  failurePolicy: hard-fail
  promotionPolicy: never-promote
  notes: >-
    Ordinary Termux cannot provide the systemd host, cgroup, mount, namespace,
    and systemd-nspawn authority required by the Linux container substrate.
    Every compatibility command exits 64 and performs no lifecycle action.
    This repository exists only to preserve lineage and redirect consumers to
    pleiades-termux or Linux-host pleiades-container before archival.
